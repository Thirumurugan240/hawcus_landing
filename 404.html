<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hawcus</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <nav class="nav" aria-label="Primary">
        <a class="nav__logo" href="/" aria-label="Hawcus CRM home">
          <img src="/hawcus-logo.png" alt="Hawcus CRM logo" width="138" height="58" />
        </a>
        <div class="nav__actions">
          <a class="btn btn--primary" href="/">Back to home</a>
        </div>
      </nav>
    </div>
  </header>
  <main id="main">
    <section class="section" style="text-align:center;">
      <div class="container">
        <span class="eyebrow">Error 404</span>
        <h1 style="font-size:clamp(2.5rem,8vw,5rem);">Page not found</h1>
        <p style="color:var(--muted-ink); max-width:44ch; margin-inline:auto; font-size:1.1rem;">The page you're looking for doesn't exist or has moved. Let's get you back on track.</p>
        <div style="display:flex; gap:0.75rem; justify-content:center; flex-wrap:wrap; margin-top:1.5rem;">
          <a class="btn btn--primary btn--lg" href="/">Go to homepage</a>
          <a class="btn btn--ghost btn--lg" href="/blog/">Read the blog</a>
        </div>
      </div>
    </section>
  </main>
  <script src="/js/main.js" defer></script>
</body>
</html>
